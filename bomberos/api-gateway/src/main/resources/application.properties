server.port=9090

# Ruta para Usuarios
spring.cloud.gateway.routes[0].id=usuarios-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/usuarios/**

# Ruta para Reportes
spring.cloud.gateway.routes[1].id=reportes-service
spring.cloud.gateway.routes[1].uri=http://localhost:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/reportes/**

# Ruta para Monitoreo
spring.cloud.gateway.routes[2].id=monitoreo-service
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/monitoreo/**

# Ruta para Alertas
spring.cloud.gateway.routes[3].id=servicio-alertas
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/alertas/**


# Puerto para Historial
spring.cloud.gateway.routes[4].id=servicio-historial
spring.cloud.gateway.routes[4].uri=http://localhost:8084
spring.cloud.gateway.routes[4].predicates[0]=Path=/historial/**